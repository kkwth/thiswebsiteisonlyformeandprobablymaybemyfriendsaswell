<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quick Math</title>
    <link rel="stylesheet" href="assets/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>


<script src="scripts/quickMath.js"></script>
<script src="scripts/timer.js"></script>
<script src="scripts/inputListener.js"></script>
<script src="scripts/update.js"></script>

<body>
    <div clsss="wrapper">
        <div class="header-container" bis_skin_checked="1">
            <div class="header"><h1>KKU Quick Math</h1></div>
            <div><form>
                <label for="fname">Name:</label>
                <input type="text" id="fname" name="fname" value="123" readonly="readonly">
                <input type="button" value=" Submit ">
            </form></div>
        </div>
        
        <div class="container" bis_skin_checked="1">
            <div id="row1">
                <div class="row" bis_skin_checked="1">
                    <div class="box red" bis_skin_checked="1">Q1</div>
                </div>
                <div class="row" bis_skin_checked="1">
                    <button id="numBox0" class="num-button" onclick="numPress(0)" bis_skin_checked="1">-</button>
                    <button id="numBox1" class="num-button" onclick="numPress(1)" bis_skin_checked="1">-</button>
                    <button id="numBox2" class="num-button" onclick="numPress(2)" bis_skin_checked="1">-</button>
                    <button id="numBox3" class="num-button" onclick="numPress(3)" bis_skin_checked="1">-</button>
                    <button id="numBox4" class="num-button" onclick="numPress(4)" bis_skin_checked="1">-</button>
                </div>
            </div>
            
            <div id="row2">
                <div class="row" bis_skin_checked="1">
                    <div id="answerBox" class="box orange" bis_skin_checked="1">---</div>
                </div>
                <div class="row" bis_skin_checked="1">
                    <div class="box yellow" id="clock" bis_skin_checked="1">-- s</div>
                </div>
            </div>
            
            <div id="row3">
                <div class="row" bis_skin_checked="1">
                    <div id="inputBox" class="box gray" bis_skin_checked="1"></div>
                </div>
                <div class="row" bis_skin_checked="1">
                    <button class="submit-button">Submit</button>
                    <button class="submit-button" onclick="RunRandomScript(); CountDown();">Run</button>
                </div>
            </div>
            
            <div class="row" bis_skin_checked="1">
                <button id="op1" class="operation-button" onclick="opPress(1)">+</button>
                <button id="op2" class="operation-button" onclick="opPress(2)">−</button>
                <button id="op3" class="operation-button" onclick="opPress(3)">×</button>
                <button id="op4" class="operation-button" onclick="opPress(4)">÷</button>
                <button id="op5" class="operation-button" onclick="opPress(5)">^</button>
                <button id="op6" class="operation-button" onclick="opPress(6)">√</button>
                <button id="op7" class="operation-button" onclick="opPress(7)">(</button>
                <button id="op8" class="operation-button" onclick="opPress(8)">)</button>
                <button id="op0" class="operation-button" onclick="opPress(0)">⌫</button>
            </div>
        </div>
    </div>
    
</body>

</html>
